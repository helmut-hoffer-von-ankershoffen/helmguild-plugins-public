name: Validate

# Lint the marketplace catalog + every plugin.json + every SKILL.md frontmatter
# on every push to main + every PR. Fast (under 30s), no external deps.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Marketplace + plugins + SKILL.md frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml

      - name: Run validator
        run: python .github/scripts/validate.py

  test-bundled-scripts:
    name: Run bundled-script tests (mcp-server/ + scripts/)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Discover + run every plugin's tests/
        shell: bash
        run: |
          set -euo pipefail
          fail=0
          shopt -s nullglob
          for plugin in plugins/*/; do
            tests_dir="$plugin/tests"
            [[ -d "$tests_dir" ]] || continue
            for t in "$tests_dir"/*.mjs "$tests_dir"/*.sh; do
              echo "::group::$(basename "$plugin")/tests/$(basename "$t")"
              case "$t" in
                *.mjs) node --test "$t" || fail=1 ;;
                *.sh)  bash "$t" || fail=1 ;;
              esac
              echo "::endgroup::"
            done
          done
          exit "$fail"
